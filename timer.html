<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LoveSpark Focus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Lora:ital,wght@0,400;0,500;1,400;1,500&family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="timer.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <img src="mascot.png" alt="Sparky" class="sparky" id="sparky">
      <div class="title-block">
        <span class="title">LoveSpark</span>
        <span class="subtitle">Focus</span>
      </div>
    </div>
    <div class="header-right">
      <div class="theme-dropdown" id="themeDropdown">
        <button class="theme-dropdown-trigger" id="themeToggle">
          <span id="themeLabel">Retro Pink</span> &#9662;
        </button>
        <div class="theme-dropdown-menu" id="themeMenu">
          <div class="theme-dropdown-header">Change Theme</div>
          <button class="theme-option" data-theme="retro">Retro Pink</button>
          <button class="theme-option" data-theme="dark">Dark</button>
          <button class="theme-option" data-theme="beige">Beige</button>
          <button class="theme-option" data-theme="slate">Slate</button>
        </div>
      </div>
      <button class="settings-btn" id="settings-btn" title="Settings">&#9881;&#65039;</button>
    </div>
  </header>

  <div id="app">

    <!-- Timer card -->
    <div class="timer-card">
      <!-- Session type tabs -->
      <div class="session-tabs">
        <button class="tab active" data-type="focus">Focus</button>
        <button class="tab" data-type="shortBreak">Short Break</button>
        <button class="tab" data-type="longBreak">Long Break</button>
      </div>

      <!-- Progress ring + countdown -->
      <div class="ring-container">
        <svg class="progress-ring" viewBox="0 0 120 120" aria-hidden="true">
          <defs>
            <linearGradient id="pinkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#E8457C"/>
              <stop offset="100%" stop-color="#C084FC"/>
            </linearGradient>
            <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#C084FC"/>
              <stop offset="100%" stop-color="#818CF8"/>
            </linearGradient>
            <linearGradient id="tealGradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#5EEAD4"/>
              <stop offset="100%" stop-color="#0D9488"/>
            </linearGradient>
          </defs>
          <circle class="ring-track" cx="60" cy="60" r="52" fill="none" stroke-width="8"/>
          <circle id="progress-ring-circle"
            cx="60" cy="60" r="52" fill="none"
            stroke="url(#pinkGradient)"
            stroke-width="8"
            stroke-linecap="round"
            stroke-dasharray="326.73"
            stroke-dashoffset="0"
            transform="rotate(-90 60 60)"/>
        </svg>
        <div class="ring-content">
          <div class="countdown" id="countdown">25:00</div>
        </div>
      </div>

      <!-- Session label -->
      <div class="session-label" id="session-label">F O C U S</div>

      <!-- Active task display -->
      <div class="active-task-display" id="active-task-display" style="display:none"></div>

      <!-- Buttons -->
      <div class="btn-row">
        <button class="btn btn-primary" id="btn-start">&#9654; Start</button>
        <button class="btn btn-secondary" id="btn-reset" disabled>&#8634; Reset</button>
      </div>

      <!-- Session dots -->
      <div class="dots-row" id="dots-row">
        <span class="dot" data-pos="0"></span>
        <span class="dot" data-pos="1"></span>
        <span class="dot" data-pos="2"></span>
        <span class="dot" data-pos="3"></span>
      </div>

      <!-- Blocking indicator -->
      <div class="blocking-indicator" id="blocking-indicator" style="display:none">&#128274; Blocking distractions</div>
    </div>

    <!-- Tasks card -->
    <div class="tasks-card">
      <div class="tasks-header">
        <span class="tasks-title">Tasks</span>
        <button class="btn-clear-done" id="btn-clear-done">Clear done</button>
      </div>
      <div class="task-list" id="task-list"></div>
      <button class="btn-add-task" id="btn-add-task">+ Add Task</button>
      <div class="add-task-form" id="add-task-form">
        <input type="text" id="new-task-text" placeholder="What will you work on?" maxlength="200" spellcheck="false">
        <div class="pomo-stepper">
          <span class="pomo-stepper-label">Est:</span>
          <button class="pomo-stepper-btn" id="pomo-dec">&#8722;</button>
          <span class="pomo-stepper-value" id="pomo-est">1</span>
          <button class="pomo-stepper-btn" id="pomo-inc">+</button>
        </div>
        <div class="add-task-actions">
          <button class="btn btn-primary" id="btn-save-task">Save</button>
          <button class="btn btn-secondary" id="btn-cancel-task">Cancel</button>
        </div>
      </div>
    </div>

    <!-- Stats card -->
    <div class="stats-card">
      <div class="stats-row-inline">
        <div class="stat-cell">
          <div class="stat-value" id="stat-sessions">0</div>
          <div class="stat-label">Sessions</div>
        </div>
        <div class="stat-cell">
          <div class="stat-value" id="stat-minutes">0 min</div>
          <div class="stat-label">Focus</div>
        </div>
        <div class="stat-cell">
          <div class="stat-value" id="stat-streak">0 days</div>
          <div class="stat-label">Streak</div>
        </div>
      </div>
    </div>

  </div>

  <div class="footer">LoveSpark Focus v1.1.3</div>

  <!-- Sparkle overlay -->
  <div class="sparkles" id="sparkles" aria-hidden="true"></div>

  <script src="timer.js"></script>
</body>
</html>
