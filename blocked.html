<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stay Focused 🌸 — LoveSpark Focus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="blocked.css">
</head>
<body>
  <div class="blocked-container">
    <div class="flower">🌸</div>

    <h1 class="title">Stay Focused!</h1>

    <p class="subtitle">
      This site is blocked during your focus session.
    </p>

    <div class="timer-box">
      <span class="timer-label">Time remaining</span>
      <span class="timer-display" id="timer-display">–:––</span>
    </div>

    <p class="message" id="message">You got this, bestie! 💕</p>

    <button class="back-btn" onclick="history.back()">← Go Back</button>

    <p class="hint">Your focus session will end soon. You can do it! ✨</p>
  </div>

  <script src="blocked.js"></script>
</body>
</html>
